name: Build & Release

# Triggers:
#   - push to main           : build all 3 OSes, upload artifacts (no release)
#   - tag push (v*)          : build + create a DRAFT release with binaries attached
#   - manual (workflow_dispatch): on-demand build, artifacts only
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# action-gh-release needs write access to create the release.
permissions:
  contents: write

jobs:
  # On tag pushes, sanity-check the tag matches package.json version so we
  # don't accidentally publish v1.2.0 from a working tree that's still 1.1.0.
  # On non-tag triggers this job runs but its check step is a no-op, so
  # downstream `needs: [validate-tag]` works without conditional gymnastics.
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            echo "Bump package.json (npm version) and re-tag, or delete the tag."
            exit 1
          fi
          echo "Tag and package.json both at $PKG_VERSION."

  build:
    needs: [validate-tag]
    strategy:
      # Don't cancel sibling builds on first failure — for releases we want
      # to see all platform results even if one breaks.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            script: make
          - os: windows-latest
            label: windows
            script: make
          - os: macos-latest
            label: macos
            script: make-mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }}
        # To enable code signing later, set these as repository secrets and
        # uncomment the env block. With them missing, electron-forge skips
        # signing automatically and produces unsigned (but functional) builds.
        # env:
        #   APPLE_ID: ${{ secrets.APPLE_ID }}
        #   APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        #   WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cvrx-${{ matrix.label }}
          path: |
            out/make/**/*.exe
            out/make/**/*.dmg
            out/make/**/*.deb
            out/make/**/*.rpm
            out/make/**/*.AppImage
            out/make/**/*.zip
          if-no-files-found: error
          retention-days: 14

  # Only runs on tag pushes — assembles all the matrix artifacts into a
  # single DRAFT release so you can write the changelog and publish manually.
  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # Placeholder body — edit on GitHub before publishing.
          # Delete sections that don't apply to this release.
          body: |
            <!-- Edit this draft, then publish. Delete unused sections. -->

            ## Added
            -

            ## Changes
            -

            ## Removed
            -

            ## Fixes
            -
          # Flatten everything from all matrix artifacts into the release.
          # Note: download-artifact@v4 unpacks each artifact into its own
          # subdir under `artifacts/`, so the glob walks all of them.
          files: artifacts/**/*
